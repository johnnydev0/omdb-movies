<!DOCTYPE html>
<html lang="pt-BR">

  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OMDB Search</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/reset.css" />
    <link rel="stylesheet" href="css/main.css" />
  </head>

  <body>
    <main class="container">
      <header class="header">
        <div class="search">
          <input
            class="search-input"
            type="search"
            id="search-input"
            placeholder="Game of Thrones"
          />
          <button class="search-button" aria-label="Buscar">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
          </button>
        </div>
      </header>

      <section class="results" id="results" hidden>
        <ul class="movie-list" id="movie-list" role="list"></ul>
      </section>

      <!-- Sessões iniciais (conteúdo que aparece quando não tiver query) -->
      <section class="shelves" id="shelves">
        <div class="shelf">
          <h2 class="shelf__title">Lançados recentemente</h2>
          <ul class="shelf__list" id="shelf-recent" role="list"></ul>
        </div>

        <div class="shelf">
          <h2 class="shelf__title">Sugeridos para você</h2>
          <ul class="shelf__list" id="shelf-suggested" role="list"></ul>
        </div>

        <div class="shelf">
          <h2 class="shelf__title">Mais vistos</h2>
          <ul class="shelf__list" id="shelf-top" role="list"></ul>
        </div>
      </section>
    </main>

<script type="module" src="js/main.js"></script>
  </body>
</html>
